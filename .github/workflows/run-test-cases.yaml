name: Run Test Cases when Branch is Pushed to Main
on:
  pull_request:
    branches:
      - main 

jobs:
  test-cases:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      # - name: Install dependencies = will add once all dependencies are included
      
      - name: Run test cases in main
        run: cd repo_client && pytest
